- import_role:
    name: setup_openbao

- environment:
    VAULT_ADDR: "{{ openbao_addr }}"
    VAULT_TOKEN: "{{ openbao_root_token }}"
  vars:
    openbao_conf:
      openbao_addr: "{{ openbao_addr }}"
      token: "{{ openbao_root_token }}"
  block:
    - name: Create a KV mount
      flowerysong.openbao.engine:
        path: secret
        type: kv
        options:
          version: 1

    - name: Create some secrets
      flowerysong.openbao.kv:
        key: "{{ item }}"
        value:
          value: pong
      loop:
        - ping
        - ping/pong

    - name: Delete a secret
      flowerysong.openbao.delete:
        path: secret/ping/pong
      loop: [0, 1]

    - name: List secrets
      flowerysong.openbao.list:
        path: secret
      register: result

    - assert:
        that:
          - result.result.data['keys'] == ['ping']

  always:
    - import_role:
        name: setup_openbao_teardown
