- import_role:
    name: setup_openbao

- environment:
    VAULT_ADDR: "{{ openbao_addr }}"
    VAULT_TOKEN: "{{ openbao_root_token }}"
  vars:
    openbao_conf:
      openbao_addr: "{{ openbao_addr }}"
      token: "{{ openbao_root_token }}"
  block:
    - name: Create the aws mounts
      flowerysong.openbao.auth_method:
        path: "{{ item }}"
        type: aws
      loop:
        - aws
        - aws-also

    - name: Attempt to set an invalid plugin version on one of the mounts
      flowerysong.openbao.auth_method:
        path: aws-also
        type: aws
        plugin_version: v99.0.0
      ignore_errors: true
      register: result

    - assert:
        that:
          - result is failed
          - "result.result.errors.0 == 'plugin not found in the catalog: aws, version=v99.0.0'"

    - name: Create a role
      flowerysong.openbao.aws_auth_role:
        name: testrole
        bound_iam_principal_arn: arn:aws:iam::123456789012:*
        resolve_aws_unique_ids: false
      check_mode: "{{ item % 2 == 0 }}"
      loop: [0, 1, 2, 3]
      register: result

    - assert:
        that:
          - result.results.0 is changed
          - result.results.1 is changed
          - result.results.2 is not changed
          - result.results.3 is not changed

    - name: Modify a role
      flowerysong.openbao.aws_auth_role:
        name: testrole
        bound_iam_principal_arn:
          - arn:aws:iam::321456789012:*
          - arn:aws:iam::123456789012:*
        resolve_aws_unique_ids: false
      check_mode: "{{ item % 2 == 0 }}"
      loop: [0, 1, 2, 3]
      register: result

    - assert:
        that:
          - result.results.0 is changed
          - result.results.1 is changed
          - result.results.2 is not changed
          - result.results.3 is not changed

    - name: Delete a role
      flowerysong.openbao.aws_auth_role:
        name: testrole
        state: absent
      check_mode: "{{ item % 2 == 0 }}"
      loop: [0, 1, 2, 3]
      register: result

    - assert:
        that:
          - result.results.0 is changed
          - result.results.1 is changed
          - result.results.2 is not changed
          - result.results.3 is not changed

  always:
    - import_role:
        name: setup_openbao_teardown
