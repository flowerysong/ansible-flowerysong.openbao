- import_role:
    name: setup_openbao

- environment:
    VAULT_ADDR: "{{ openbao_addr }}"
    VAULT_TOKEN: "{{ openbao_root_token }}"
  vars:
    openbao_conf:
      openbao_addr: "{{ openbao_addr }}"
      token: "{{ openbao_root_token }}"
  block:
    - name: Create the KV mounts
      flowerysong.openbao.engine:
        path: "{{ item }}"
        type: kv
        options:
          version: 1
      loop:
        - secret
        - terces

    - name: Pretend to create a secret
      flowerysong.openbao.kv:
        key: ping
        value:
          value: pong
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed

    - name: Create a secret
      flowerysong.openbao.kv:
        key: ping
        value:
          value: pong
      loop: [0, 1]
      register: result

    - assert:
        that:
          - result.results.0 is changed
          - result.results.1 is not changed

    - name: Pretend to modify a secret
      flowerysong.openbao.kv:
        key: ping
        value:
          value: pong
          eulav: gnop
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed

    - name: Modify a secret
      flowerysong.openbao.kv:
        key: ping
        value: "{{ item }}"
      loop:
        - value: pong
          eulav: gnop
        - value: pong
          eulav: gnop
        - eulav: gnop
          value: pong
      register: result

    - assert:
        that:
          - result.results.0 is changed
          - result.results.1 is not changed
          - result.results.2 is not changed

    - name: Pretend to delete a secret
      flowerysong.openbao.kv:
        key: ping
        state: absent
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed

    - name: Delete a secret
      flowerysong.openbao.kv:
        key: ping
        state: absent
      loop: [0, 1]
      register: result

    - assert:
        that:
          - result.results.0 is changed
          - result.results.1 is not changed

    - name: Create a secret on a non-standard mount
      flowerysong.openbao.kv:
        mount_point: terces/
        key: ping
        value:
          value: gnop
      loop: [0, 1]
      register: result

    - assert:
        that:
          - result.results.0 is changed
          - result.results.1 is not changed
  always:
    - import_role:
        name: setup_openbao_teardown
