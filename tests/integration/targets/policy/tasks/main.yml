- import_role:
    name: setup_openbao

- environment:
    VAULT_ADDR: "{{ openbao_addr }}"
    VAULT_TOKEN: "{{ openbao_root_token }}"
  block:
    - name: Fetch existing ACLs
      flowerysong.openbao.policy_info:

    - name: Pretend to create a policy
      flowerysong.openbao.policy:
        name: testpol
        policy:
          path:
            secret:
              capabilities:
                - list
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed

    - name: Create a policy
      flowerysong.openbao.policy:
        name: testpol
        policy:
          path:
            secret:
              capabilities:
                - list
      loop: [0, 1]
      register: result

    - assert:
        that:
          - result.results.0 is changed
          - result.results.1 is not changed
          - result.results.0.policy == result.results.1.policy

    - name: Test terse policies
      flowerysong.openbao.policy:
        name: testpol
        policy: "{{ item }}"
      loop:
        - "{{ policy }}"
        - "{{ policy }}"
        - "{{ { 'path': policy } }}"
        - secret: [list]
          secret/*: [list]
      vars:
        policy:
          secret:
            capabilities:
              - list
          secret/*:
            capabilities:
              - list
      register: result

    - assert:
        that:
          - result.results.0 is changed
          - result.results.1 is not changed
          - result.results.2 is not changed
          - result.results.3 is not changed

    - name: Pretend to delete a policy
      flowerysong.openbao.policy:
        name: testpol
        state: absent
      check_mode: true
      register: result

    - assert:
        that:
          - result is changed

    - name: Fetch ACLs
      flowerysong.openbao.policy_info:
      check_mode: true
      register: result

    - assert:
        that:
          - "'testpol' in result.policies"

    - name: Delete a policy
      flowerysong.openbao.policy:
        name: testpol
        state: absent
      loop: [0, 1]
      register: result

    - assert:
        that:
          - result.results.0 is changed
          - result.results.1 is not changed

    - name: Fetch ACLs
      flowerysong.openbao.policy_info:
      register: result

    - assert:
        that:
          - "'testpol' not in result.policies"

    - name: Write an HCL policy
      flowerysong.openbao.policy:
        name: testhcl
        policy: |
          path "secret" {
            capabilities = ["list"]
          }
      loop: [0, 1]
      register: result

    - assert:
        that:
          - result.results.0 is changed
          - result.results.1 is not changed
  always:
    - import_role:
        name: setup_openbao_teardown
