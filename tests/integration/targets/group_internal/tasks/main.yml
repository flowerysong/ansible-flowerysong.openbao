- import_role:
    name: setup_openbao

- environment:
    VAULT_ADDR: "{{ openbao_addr }}"
    VAULT_TOKEN: "{{ openbao_root_token }}"
  block:
    - name: Configure a group
      flowerysong.openbao.group_internal:
        name: blackops
        policies: default
      check_mode: "{{ item % 2 == 0 }}"
      loop: [0, 1, 2, 3]
      register: result

    - assert:
        that:
          - result.results.0 is changed
          - result.results.1 is changed
          - result.results.2 is not changed
          - result.results.3 is not changed

    - name: Reconfigure the group
      flowerysong.openbao.group_internal:
        name: blackops
        policies:
          - default
          - blackops
      check_mode: "{{ item % 2 == 0 }}"
      loop: [0, 1, 2, 3]
      register: result

    - assert:
        that:
          - result.results.0 is changed
          - result.results.1 is changed
          - result.results.2 is not changed
          - result.results.3 is not changed

    - name: Delete the group
      flowerysong.openbao.group_internal:
        name: blackops
        state: absent
      check_mode: "{{ item % 2 == 0 }}"
      loop: [0, 1, 2, 3]
      register: result

    - assert:
        that:
          - result.results.0 is changed
          - result.results.1 is changed
          - result.results.2 is not changed
          - result.results.3 is not changed

  always:
    - import_role:
        name: setup_openbao_teardown
