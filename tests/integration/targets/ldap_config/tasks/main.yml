- import_role:
    name: setup_openbao

- environment:
    VAULT_ADDR: "{{ openbao_addr }}"
    VAULT_TOKEN: "{{ openbao_root_token }}"
  vars:
    openbao_conf:
      openbao_addr: "{{ openbao_addr }}"
      token: "{{ openbao_root_token }}"
  block:
    - name: Create an LDAP mount
      flowerysong.openbao.auth_method:
        path: ldap
        type: ldap

    - name: Configure the mount
      flowerysong.openbao.ldap_config:
        url: ldaps://ldap.example.com/
      check_mode: "{{ item % 2 == 0 }}"
      loop: [0, 1, 2, 3]
      register: result

    - assert:
        that:
          - result.results.0 is changed
          - result.results.1 is changed
          - result.results.2 is not changed
          - result.results.3 is not changed

    - name: Reconfigure the mount
      flowerysong.openbao.ldap_config:
        url:
          - ldaps://ldap1.example.com/
          - ldap://ldap2.example.com/
        userdn: ou=People,dc=example,dc=com
        request_timeout: 100
        starttls: true
        tls_max_version: tls13
        groupdn: ou=User Groups,ou=Groups,dc=example,dc=com
        groupfilter: !unsafe (member={{.UserDN}})
        groupattr: email
      check_mode: "{{ item % 2 == 0 }}"
      loop: [0, 1, 2, 3]
      register: result

    - assert:
        that:
          - result.results.0 is changed
          - result.results.1 is changed
          - result.results.2 is not changed
          - result.results.3 is not changed

  always:
    - import_role:
        name: setup_openbao_teardown
