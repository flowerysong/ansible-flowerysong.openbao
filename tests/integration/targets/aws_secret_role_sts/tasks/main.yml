- import_role:
    name: setup_openbao

- environment:
    VAULT_ADDR: "{{ openbao_addr }}"
    VAULT_TOKEN: "{{ openbao_root_token }}"
  vars:
    openbao_conf:
      openbao_addr: "{{ openbao_addr }}"
      token: "{{ openbao_root_token }}"
  block:
    - name: Create the aws mounts
      flowerysong.openbao.engine:
        path: "{{ item }}"
        type: aws
      loop:
        - aws
        - aws-also

    - name: Create a role
      flowerysong.openbao.aws_secret_role_sts:
        name: testrole
        role_arns: arn:aws:iam::123456789012:role/examplerole
      check_mode: "{{ item % 2 == 0 }}"
      loop: [0, 1, 2, 3]
      register: result

    - assert:
        that:
          - result.results.0 is changed
          - result.results.1 is changed
          - result.results.2 is not changed
          - result.results.3 is not changed

    - name: Modify a role
      flowerysong.openbao.aws_secret_role_sts:
        name: testrole
        role_arns:
          - arn:aws:iam::123456789012:role/otherexamplerole
          - arn:aws:iam::123456789012:role/examplerole
      check_mode: "{{ item % 2 == 0 }}"
      loop: [0, 1, 2, 3]
      register: result

    - assert:
        that:
          - result.results.0 is changed
          - result.results.1 is changed
          - result.results.2 is not changed
          - result.results.3 is not changed

    - name: Delete a role
      flowerysong.openbao.aws_secret_role_sts:
        name: testrole
        state: absent
      check_mode: "{{ item % 2 == 0 }}"
      loop: [0, 1, 2, 3]
      register: result

    - assert:
        that:
          - result.results.0 is changed
          - result.results.1 is changed
          - result.results.2 is not changed
          - result.results.3 is not changed

  always:
    - import_role:
        name: setup_openbao_teardown
